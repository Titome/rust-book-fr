name: Deploy FR to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions nécessaires pour que `actions/deploy-pages` puisse publier.
permissions:
  contents: read
  pages: write
  id-token: write

# Ne garder qu'un seul déploiement actif à la fois ; pas d'annulation pour
# laisser les runs en cours finir proprement (en particulier `mdbook test`).
concurrency:
  group: pages
  cancel-in-progress: false

env:
  MDBOOK_VERSION: 0.5.1

jobs:
  build:
    name: Build FR book
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.90
        run: |
          rustup set profile minimal
          rustup toolchain install 1.90 -c rust-docs
          rustup default 1.90

      - name: Install mdbook ${{ env.MDBOOK_VERSION }}
        run: |
          mkdir -p bin
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz --directory=bin
          echo "$(pwd)/bin" >> "$GITHUB_PATH"

      # Fournit le préprocesseur `mdbook-gettext` requis pour substituer
      # les msgstrs de `po/fr.po` lors du build FR. Non nécessaire en EN —
      # c'est pourquoi `[preprocessor.gettext]` est marqué `optional = true`
      # dans book.toml, ce qui permet au CI upstream de builder EN sans
      # cette dépendance.
      - name: Install mdbook-i18n-helpers
        run: cargo install mdbook-i18n-helpers --locked

      - name: Report versions
        run: |
          rustup --version
          rustc -Vv
          mdbook --version

      # `mdbook test` ne construit pas automatiquement la crate `trpl` ;
      # il faut le faire en amont et lui passer le chemin de ses `deps`.
      - name: Build `trpl` crate
        working-directory: packages/trpl
        run: cargo build

      - name: Run `mdbook test` (FR)
        env:
          MDBOOK_BOOK__LANGUAGE: fr
        run: mdbook test --library-path packages/trpl/target/debug/deps

      - name: Build book (FR)
        env:
          MDBOOK_BOOK__LANGUAGE: fr
          # Le site est hébergé sur un sous-chemin (`titome.github.io/rust-book-fr/`),
          # donc on override `output.html.site-url` pour que mdbook génère des
          # chemins absolus corrects (CSS, JS, liens intra-livre). Pas modifié
          # dans book.toml pour préserver la compat avec le build upstream.
          MDBOOK_OUTPUT__HTML__SITE_URL: /rust-book-fr/
        run: mdbook build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
