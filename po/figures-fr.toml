fr = "Un diagramme avec des boîtes empilées étiquetées Tâche A et Tâche B, contenant des losanges qui représentent les sous-tâches. Des flèches vont de A1 vers A2, A2 vers A3, A3 vers A4, B1 vers B2 et B2 vers B3. Aucune flèche ne traverse entre les boîtes de la Tâche A et de la Tâche B."

