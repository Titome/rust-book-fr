[[sub]]
en = "A linked list with the label 'a' pointing to three elements. The first element contains the integer 5 and points to the second element. The second element contains the integer 10 and points to the third element. The third element contains the value 'Nil' that signifies the end of the list; it does not point anywhere. A linked list with the label 'b' points to an element that contains the integer 3 and points to the first element of list 'a'. A linked list with the label 'c' points to an element that contains the integer 4 and also points to the first element of list 'a' so that lists 'b' and 'c' are two lists that share ownership of list 'a'."
fr = "Une liste chaînée étiquetée « a » pointant vers trois éléments. Le premier élément contient l’entier 5 et pointe vers le deuxième élément. Le deuxième élément contient l’entier 10 et pointe vers le troisième élément. Le troisième élément contient la valeur « Nil » qui signale la fin de la liste ; il ne pointe vers rien. Une liste chaînée étiquetée « b » pointe vers un élément qui contient l’entier 3 et pointe vers le premier élément de la liste « a ». Une liste chaînée étiquetée « c » pointe vers un élément qui contient l’entier 4 et pointe également vers le premier élément de la liste « a », de sorte que les listes « b » et « c » sont deux listes qui partagent la possession de la liste « a »."

# ch15-06-reference-cycles.md
[[sub]]
en = "A rectangle labeled 'a' that points to a rectangle containing the integer 5. A rectangle labeled 'b' that points to a rectangle containing the integer 10. The rectangle containing 5 points to the rectangle containing 10, and the rectangle containing 10 points back to the rectangle containing 5, creating a cycle."
fr = "Un rectangle étiqueté « a » qui pointe vers un rectangle contenant l’entier 5. Un rectangle étiqueté « b » qui pointe vers un rectangle contenant l’entier 10. Le rectangle contenant 5 pointe vers le rectangle contenant 10, et le rectangle contenant 10 pointe à son tour vers le rectangle contenant 5, créant ainsi un cycle."

