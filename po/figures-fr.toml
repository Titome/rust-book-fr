# --- ch17-05-traits-for-async.md ---

[[sub]]
en = "A single-column, three-row table representing a future, fut1, which has data values 0 and 1 in the first two rows and an arrow pointing from the third row back to the second row, representing an internal reference within the future."
fr = "Un tableau à une colonne et trois lignes représentant une future, fut1, qui contient les valeurs 0 et 1 dans les deux premières lignes et une flèche pointant de la troisième ligne vers la deuxième ligne, représentant une référence interne à la future."

[[sub]]
en = "Figure 17-4: A self-referential data type"
fr = "Figure 17-4 : Un type de données auto-référentiel"

[[sub]]
en = "Two tables, depicting two futures, fut1 and fut2, each of which has one column and three rows, representing the result of having moved a future out of fut1 into fut2. The first, fut1, is grayed out, with a question mark in each index, representing unknown memory. The second, fut2, has 0 and 1 in the first and second rows and an arrow pointing from its third row back to the second row of fut1, representing a pointer that is referencing the old location in memory of the future before it was moved."
fr = "Deux tableaux, représentant deux futures, fut1 et fut2, chacun ayant une colonne et trois lignes, représentant le résultat du déplacement d’une future de fut1 vers fut2. Le premier, fut1, est grisé, avec un point d’interrogation dans chaque case, représentant une mémoire inconnue. Le second, fut2, contient 0 et 1 dans les première et deuxième lignes et une flèche pointant de sa troisième ligne vers la deuxième ligne de fut1, représentant un pointeur qui référence l’ancien emplacement mémoire de la future avant son déplacement."

[[sub]]
en = "Figure 17-5: The unsafe result of moving a self-referential data type"
fr = "Figure 17-5 : Le résultat non sûr du déplacement d’un type de données auto-référentiel"

[[sub]]
en = "Three boxes laid out side by side. The first is labeled “Pin”, the second “b1”, and the third “pinned”. Within “pinned” is a table labeled “fut”, with a single column; it represents a future with cells for each part of the data structure. Its first cell has the value “0”, its second cell has an arrow coming out of it and pointing to the fourth and final cell, which has the value “1” in it, and the third cell has dashed lines and an ellipsis to indicate there may be other parts to the data structure. All together, the “fut” table represents a future which is self-referential. An arrow leaves the box labeled “Pin”, goes through the box labeled “b1” and terminates inside the “pinned” box at the “fut” table."
fr = "Trois boîtes disposées côte à côte. La première est étiquetée « Pin », la deuxième « b1 », et la troisième « pinned ». À l’intérieur de « pinned » se trouve un tableau étiqueté « fut », à une seule colonne ; il représente une future avec des cellules pour chaque partie de la structure de données. Sa première cellule contient la valeur « 0 », sa deuxième cellule a une flèche qui en sort et pointe vers la quatrième et dernière cellule, qui contient la valeur « 1 », et la troisième cellule a des lignes en pointillés et des points de suspension pour indiquer qu’il peut y avoir d’autres parties à la structure de données. Dans son ensemble, le tableau « fut » représente une future auto-référentielle. Une flèche part de la boîte étiquetée « Pin », traverse la boîte étiquetée « b1 » et se termine à l’intérieur de la boîte « pinned » au niveau du tableau « fut »."

[[sub]]
en = "Figure 17-6: Pinning a `Box` that points to a self-referential future type"
fr = "Figure 17-6 : Épingler une `Box` qui pointe vers un type future auto-référentiel"

[[sub]]
en = "Four boxes laid out in three rough columns, identical to the previous diagram with a change to the second column. Now there are two boxes in the second column, labeled “b1” and “b2”, “b1” is grayed out, and the arrow from “Pin” goes through “b2” instead of “b1”, indicating that the pointer has moved from “b1” to “b2”, but the data in “pinned” has not moved."
fr = "Quatre boîtes disposées en trois colonnes approximatives, identiques au diagramme précédent avec un changement dans la deuxième colonne. Il y a maintenant deux boîtes dans la deuxième colonne, étiquetées « b1 » et « b2 » ; « b1 » est grisée, et la flèche depuis « Pin » passe par « b2 » au lieu de « b1 », indiquant que le pointeur a été déplacé de « b1 » vers « b2 », mais que les données dans « pinned » n’ont pas bougé."

[[sub]]
en = "Figure 17-7: Moving a `Box` which points to a self-referential future type"
fr = "Figure 17-7 : Déplacer une `Box` qui pointe vers un type future auto-référentiel"

[[sub]]
en = "A box labeled “Pin” on the left with an arrow going from it to a box labeled “String” on the right. The “String” box contains the data 5usize, representing the length of the string, and the letters “h”, “e”, “l”, “l”, and “o” representing the characters of the string “hello” stored in this String instance. A dotted rectangle surrounds the “String” box and its label, but not the “Pin” box."
fr = "Une boîte étiquetée « Pin » à gauche avec une flèche qui en part vers une boîte étiquetée « String » à droite. La boîte « String » contient la donnée 5usize, représentant la longueur de la chaîne, et les lettres « h », « e », « l », « l » et « o » représentant les caractères de la chaîne « hello » stockée dans cette instance de String. Un rectangle en pointillés entoure la boîte « String » et son étiquette, mais pas la boîte « Pin »."

[[sub]]
en = "Figure 17-8: Pinning a `String`; the dotted line indicates that the `String` implements the `Unpin` trait and thus is not pinned"
fr = "Figure 17-8 : Épingler une `String` ; la ligne en pointillés indique que `String` implémente le trait `Unpin` et n’est donc pas épinglée"

[[sub]]
en = "The same “hello” string data from the previous example, now labeled “s1” and grayed out. The “Pin” box from the previous example now points to a different String instance, one that is labeled “s2”, is valid, has a length of 7usize, and contains the characters of the string “goodbye”. s2 is surrounded by a dotted rectangle because it, too, implements the Unpin trait."
fr = "Les mêmes données de chaîne « hello » de l’exemple précédent, maintenant étiquetées « s1 » et grisées. La boîte « Pin » de l’exemple précédent pointe maintenant vers une instance de String différente, étiquetée « s2 », qui est valide, a une longueur de 7usize et contient les caractères de la chaîne « goodbye ». s2 est entourée d’un rectangle en pointillés parce qu’elle implémente également le trait Unpin."

[[sub]]
en = "Figure 17-9: Replacing the `String` with an entirely different `String` in memory"
fr = "Figure 17-9 : Remplacer la `String` par une `String` entièrement différente en mémoire"

